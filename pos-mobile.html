<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lady Fresa POS">
<meta name="theme-color" content="#A6182E">
<title>Lady Fresa · POS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --red: #A6182E;
  --red-dark: #672626;
  --red-light: #FDEEF1;
  --red-mid: #FD9CB3;
  --green: #053A0A;
  --green-light: #E6F0E7;
  --amber: #B5860D;
  --amber-light: #FDF3DC;
  --blue: #2A7A85;
  --blue-light: #E4F3F5;
  --text: #1a0508;
  --text-2: #5a2830;
  --text-3: #9a7075;
  --bg: #FDF6F7;
  --surface: #fff;
  --border: rgba(166,24,46,0.09);
  --border-2: rgba(166,24,46,0.18);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── SCREENS ── */
.screen { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); }
.screen.active { display: flex; }

/* ── LOGIN ── */
#screen-login {
  background: linear-gradient(160deg, #672626 0%, #A6182E 50%, #c41f38 100%);
  align-items: center; justify-content: center;
  padding: 40px 32px calc(40px + var(--safe-bottom));
}
.login-logo-wrap { text-align: center; margin-bottom: 48px; }
.login-logo { font-family: 'Bebas Neue', serif; font-size: 52px; color: #fff; letter-spacing: 4px; line-height: 1; display: block; }
.login-est { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }
.login-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 320px; }
.login-greeting { font-size: 13px; color: rgba(255,255,255,0.7); text-align: center; margin-bottom: 20px; letter-spacing: 0.5px; }
.pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 24px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); background: transparent; transition: all 0.2s; }
.pin-dot.filled { background: #fff; border-color: #fff; transform: scale(1.1); }
.pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.pin-btn {
  height: 62px; border-radius: 14px; border: none;
  background: rgba(255,255,255,0.15); color: #fff;
  font-size: 24px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.pin-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
.pin-btn.del { font-size: 18px; }
.pin-btn.ok { background: rgba(255,255,255,0.95); color: #A6182E; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
.pin-btn.ok:active { background: #fff; }
.login-error { font-size: 12px; color: rgba(255,200,200,0.9); text-align: center; margin-top: 14px; min-height: 18px; }

/* ── TOPBAR ── */
#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  padding-top: var(--safe-top);
  height: calc(56px + var(--safe-top));
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 10;
}
.tb-logo { font-family: 'Bebas Neue', serif; font-size: 20px; color: var(--red); letter-spacing: 2px; line-height: 1; flex-shrink: 0; }
.tb-order-info { flex: 1; min-width: 0; }
.tb-order-num { font-size: 12px; font-weight: 600; color: var(--text); }
.tb-order-svc { font-size: 10px; color: var(--text-3); }
.tb-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.tb-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border-2); background: transparent; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: var(--text-2); flex-shrink: 0; }
.tb-btn:active { background: var(--red-light); }
.tb-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; background: var(--green-light); color: var(--green); white-space: nowrap; }

/* ── TABS ── */
#cat-tabs {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 0;
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none; -ms-overflow-style: none;
  padding: 0 16px;
}
#cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-3); border: none; background: none; border-bottom: 2px solid transparent; white-space: nowrap; cursor: pointer; font-family: 'DM Sans', sans-serif; flex-shrink: 0; transition: color 0.15s; }
.cat-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 600; }

/* ── PRODUCTS GRID ── */
#products-area { flex: 1; overflow-y: auto; padding: 12px; -webkit-overflow-scrolling: touch; }
#products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.prod-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.15s; user-select: none;
  min-height: 120px; justify-content: center;
  text-align: center;
}
.prod-card:active { transform: scale(0.97); background: var(--red-light); }
.prod-card.in-order { border-color: var(--red-mid); background: #fff9fa; }
.prod-emoji { font-size: 28px; line-height: 1; }
.prod-name { font-size: 12px; font-weight: 600; line-height: 1.3; color: var(--text); }
.prod-price { font-size: 13px; font-weight: 700; color: var(--red); }
.prod-desc { font-size: 10px; color: var(--text-3); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.prod-qty-badge { position: absolute; top: 8px; left: 8px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.prod-cat-badge { position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 6px; background: var(--amber-light); color: var(--amber); }

/* ── BOTTOM ORDER BAR ── */
#order-bar {
  background: var(--red);
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-bottom));
  display: none; flex-direction: column; gap: 0;
  flex-shrink: 0;
}
#order-bar.visible { display: flex; }
.ob-main { display: flex; align-items: center; justify-content: space-between; }
.ob-info { color: #fff; }
.ob-count { font-size: 12px; opacity: 0.8; margin-bottom: 2px; }
.ob-total { font-family: 'Bebas Neue', serif; font-size: 26px; letter-spacing: 1px; }
.ob-btn { background: #fff; color: var(--red); font-family: 'Bebas Neue', serif; font-size: 18px; letter-spacing: 2px; padding: 12px 28px; border-radius: 14px; border: none; cursor: pointer; font-weight: 400; }
.ob-btn:active { background: rgba(255,255,255,0.9); }

/* ── SHEET (bottom sheet modal) ── */
.sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(26,5,8,0.6); z-index: 100; }
.sheet-overlay.open { display: block; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
  background: var(--surface); border-radius: 24px 24px 0 0;
  padding-bottom: var(--safe-bottom);
  max-height: 92vh; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 44px; height: 5px; background: var(--border-2); border-radius: 3px;
  margin: 0 auto; flex-shrink: 0; cursor: grab; transition: background 0.2s;
  /* Bigger touch target without changing visual size */
  padding: 12px 40px;
  background-clip: content-box;
  box-sizing: content-box;
  width: 44px;
}
.sheet-handle:active { background: var(--red-mid); background-clip: content-box; }
/* Wrapper to keep the visual look */
.sheet-handle-wrap {
  padding: 12px 0 4px;
  display: flex; justify-content: center; flex-shrink: 0;
  cursor: grab;
}
.sheet-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sheet-title { font-family: 'Bebas Neue', serif; font-size: 22px; color: var(--red); letter-spacing: 1px; }
.sheet-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.sheet-body { flex: 1; overflow-y: auto; padding: 16px 20px; -webkit-overflow-scrolling: touch; }
.sheet-footer { padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: max(12px, var(--safe-bottom)); }

/* ── CUSTOMIZER ── */
.mod-section { margin-bottom: 22px; }
.mod-title { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.mod-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; text-transform: none; letter-spacing: 0; }
.badge-req { background: var(--red-light); color: var(--red); }
.badge-opt { background: var(--bg); color: var(--text-3); }

/* Sizes */
.sizes-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.size-card { border: 2px solid var(--border-2); border-radius: 14px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; }
.size-card:active { transform: scale(0.97); }
.size-card.sel { border-color: var(--red); background: var(--red-light); }
.size-icon { font-size: 22px; margin-bottom: 4px; }
.size-name { font-size: 13px; font-weight: 600; color: var(--text); }
.size-extra { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.size-card.sel .size-name { color: var(--red-dark); }
.size-card.sel .size-extra { color: var(--red); }

/* Bases */
.bases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.base-chip { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border: 2px solid var(--border-2); border-radius: 12px; cursor: pointer; transition: all 0.15s; }
.base-chip:active { transform: scale(0.98); }
.base-chip.sel { border-color: #c1601a; background: #FEF3EC; }
.base-name { font-size: 13px; font-weight: 500; flex: 1; }
.base-chip.sel .base-name { color: #8B3A0F; }
.base-extra { font-size: 11px; color: var(--text-3); }
.base-chip.sel .base-extra { color: #c1601a; }
.base-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border-2); display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; transition: all 0.15s; }
.base-chip.sel .base-check { background: #c1601a; border-color: #c1601a; color: #fff; }

/* Toppings */
.tops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.top-chip { display: flex; align-items: center; gap: 8px; padding: 10px; border: 2px solid var(--border-2); border-radius: 12px; cursor: pointer; transition: all 0.15s; }
.top-chip:active { transform: scale(0.97); }
.top-chip.sel { border-color: var(--red); background: var(--red-light); }
.top-chip.sel-prem { border-color: #534AB7; background: #EEEDFE; }
.top-chip.sel-shot { border-color: var(--green); background: var(--green-light); }
.top-emoji { font-size: 16px; flex-shrink: 0; }
.top-name { font-size: 12px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top-price { font-size: 10px; color: var(--text-3); flex-shrink: 0; }
.top-chip.sel .top-price { color: var(--red); font-weight: 600; }
.top-chip.sel-prem .top-price { color: #534AB7; font-weight: 600; }

/* Free toppings counter */
.free-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.free-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; background: var(--green-light); color: var(--green); transition: all 0.2s; }
.free-pill.full { background: var(--amber-light); color: var(--amber); }

/* Nota */
.nota-input { width: 100%; height: 60px; border: 1.5px solid var(--border-2); border-radius: 12px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; resize: none; outline: none; color: var(--text); background: var(--surface); }
.nota-input:focus { border-color: var(--red); }

/* Custom footer price */
.custom-footer { display: flex; align-items: center; gap: 12px; }
.cf-price { flex: 1; }
.cf-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; }
.cf-val { font-family: 'Bebas Neue', serif; font-size: 28px; color: var(--text); letter-spacing: 0.5px; }
.cf-btn { flex: 2; height: 52px; background: var(--red); color: #fff; border: none; border-radius: 14px; font-family: 'Bebas Neue', serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; }
.cf-btn:active { background: var(--red-dark); }
.cf-btn:disabled { opacity: 0.35; }

/* ── ORDER SHEET ── */
.order-item-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.oi-emoji { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.oi-info { flex: 1; min-width: 0; }
.oi-name { font-size: 13px; font-weight: 600; }
.oi-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.oi-tag { font-size: 10px; padding: 2px 7px; border-radius: 8px; }
.tag-size { background: #EEEDFE; color: #534AB7; }
.tag-base { background: #FEF3EC; color: #8B3A0F; }
.tag-top { background: var(--red-light); color: var(--red-dark); }
.tag-paid { background: var(--amber-light); color: var(--amber); }
.oi-note { font-size: 10px; color: var(--text-3); font-style: italic; margin-top: 3px; }
.oi-edit { font-size: 10px; color: var(--text-3); margin-top: 3px; cursor: pointer; display: inline-block; }
.oi-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.oi-price { font-size: 13px; font-weight: 700; color: var(--text); }
.qty-row { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border-2); background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-2); }
.qty-btn:active { background: var(--red-light); border-color: var(--red); }
.qty-num { font-size: 14px; font-weight: 700; min-width: 20px; text-align: center; }

/* Order totals */
.order-totals { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; margin-top: 16px; }
.ot-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); margin-bottom: 6px; }
.ot-row:last-child { margin-bottom: 0; font-size: 16px; font-weight: 700; color: var(--text); padding-top: 8px; border-top: 1px solid var(--border-2); }

/* Service + client row */
.svc-row { display: flex; gap: 8px; margin-bottom: 12px; }
.svc-btn { flex: 1; padding: 8px 6px; border: 1.5px solid var(--border-2); border-radius: 10px; background: transparent; font-size: 11px; font-weight: 500; color: var(--text-2); cursor: pointer; font-family: 'DM Sans', sans-serif; text-align: center; transition: all 0.15s; }
.svc-btn.active { background: var(--red-light); border-color: var(--red-mid); color: var(--red-dark); font-weight: 600; }
.client-input { width: 100%; height: 40px; border: 1.5px solid var(--border-2); border-radius: 10px; padding: 0 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; background: var(--surface); margin-bottom: 12px; }
.client-input:focus { border-color: var(--red); }

/* Pay methods */
.pay-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.pay-btn { padding: 10px 4px; border: 1.5px solid var(--border-2); border-radius: 12px; background: transparent; font-size: 11px; font-weight: 500; color: var(--text-2); cursor: pointer; font-family: 'DM Sans', sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.pay-btn .pay-icon { font-size: 18px; }
.pay-btn.active { background: var(--red-light); border-color: var(--red-mid); color: var(--red-dark); }
.pay-btn:active { transform: scale(0.97); }

/* Cobrar btn */
.cobrar-btn { width: 100%; height: 54px; background: var(--red); color: #fff; border: none; border-radius: 14px; font-family: 'Bebas Neue', serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; }
.cobrar-btn:active { background: var(--red-dark); }
.cobrar-btn:disabled { opacity: 0.35; }

/* ── COBRO SHEET ── */
.cobro-total { font-family: 'Bebas Neue', serif; font-size: 52px; color: var(--text); text-align: center; letter-spacing: -1px; line-height: 1; margin: 16px 0; }
.cobro-sub { text-align: center; font-size: 12px; color: var(--text-3); margin-bottom: 20px; }
.efec-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
.efec-input { width: 100%; height: 52px; border: 2px solid var(--border-2); border-radius: 12px; padding: 0 16px; font-size: 22px; font-weight: 700; font-family: 'DM Sans', sans-serif; text-align: right; outline: none; color: var(--text); margin-bottom: 10px; }
.efec-input:focus { border-color: var(--red); }
.quick-btns { display: flex; gap: 8px; margin-bottom: 14px; }
.quick-btn { flex: 1; padding: 10px 4px; border: 1.5px solid var(--border-2); border-radius: 10px; background: var(--bg); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-2); text-align: center; }
.quick-btn:active { background: var(--red-light); border-color: var(--red-mid); color: var(--red); }
.cambio-box { background: var(--green-light); border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.cambio-label { font-size: 13px; color: var(--green); font-weight: 600; }
.cambio-val { font-family: 'Bebas Neue', serif; font-size: 28px; color: var(--green); letter-spacing: 0.5px; }
.confirmar-btn { width: 100%; height: 56px; background: var(--green); color: #fff; border: none; border-radius: 14px; font-family: 'Bebas Neue', serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; }
.confirmar-btn:active { background: #032606; }
.confirmar-btn:disabled { opacity: 0.35; }

/* ── SUCCESS FLASH ── */
#success-flash {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: linear-gradient(135deg, #672626, #A6182E);
  flex-direction: column; align-items: center; justify-content: center;
  color: #fff; gap: 12px; padding: 40px;
}
#success-flash.open { display: flex; animation: flashIn 0.3s ease; }
@keyframes flashIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.sf-icon { font-size: 72px; }
.sf-title { font-family: 'Bebas Neue', serif; font-size: 42px; letter-spacing: 2px; }
.sf-sub { font-size: 16px; opacity: 0.85; text-align: center; }
.sf-cambio { font-family: 'Bebas Neue', serif; font-size: 28px; margin-top: 4px; }

/* ── HISTORIAL SHEET ── */
.hist-order { background: var(--bg); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
.hist-head { display: flex; justify-content: space-between; margin-bottom: 4px; }
.hist-num { font-size: 13px; font-weight: 700; color: var(--red); }
.hist-amt { font-size: 14px; font-weight: 700; }
.hist-meta { font-size: 11px; color: var(--text-3); }
.hist-items { font-size: 12px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
.empty-state .e-icon { font-size: 48px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }

/* ── DISCOUNT ROW ── */
.disc-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.disc-btn { padding: 6px 14px; border: 1.5px solid var(--border-2); border-radius: 20px; background: transparent; font-size: 12px; font-weight: 500; color: var(--text-2); cursor: pointer; font-family: 'DM Sans', sans-serif; }
.disc-btn.active { background: var(--amber-light); border-color: var(--amber); color: var(--amber); font-weight: 600; }
/* Promo code input */
.promo-code-row { display: flex; gap: 8px; margin-bottom: 12px; }

let svcType = 'mostrador';

};

// LOGIN
// ═══════════════════════════════
function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updateDots();
  if (pinBuffer.length === 4) setTimeout(pinEnter, 120);
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updateDots(); }
function updateDots() {
  for (let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled', i < pinBuffer.length);
}
async function pinEnter() {
  if (pinBuffer.length < 4) return;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/users?pin=eq.${pinBuffer}&active=eq.true&select=*`, { headers:{ apikey:SB_KEY, Authorization:'Bearer '+SB_KEY } });
    const users = await res.json();
    if (!users.length) { errEl.textContent = 'PIN incorrecto'; pinBuffer=''; updateDots(); return; }
    currentUser = users[0];
    // Restore session
    localStorage.setItem('lf_session', JSON.stringify({ date: new Date().toDateString(), user: { id:currentUser.id, name:currentUser.name, role:currentUser.role, sucursal:currentUser.sucursal } }));
    showPOS();
  } catch(e) { errEl.textContent = 'Error de conexión'; pinBuffer=''; updateDots(); }
}

function showPOS() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-pos').classList.add('active');
  document.getElementById('tb-user').textContent = currentUser.name;
  document.getElementById('order-num').textContent = String(orderN).padStart(3,'0');
  document.getElementById('order-num-2').textContent = String(orderN).padStart(3,'0');
  // Show discount if has permission
  const p = PERMS[currentUser.role] || PERMS.cajero;
  window._hasDiscount = p.discount; // store permission for when order sheet opens
  loadCatalog();
  cargarPromos();
  loadTicketComandaConfig();
}

function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  currentUser = null; pinBuffer = ''; updateDots();
  localStorage.removeItem('lf_session');
  document.getElementById('screen-pos').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('login-error').textContent = '';
  order = []; discount = 0; promoActiva = null; payMethod = 'efectivo'; svcType = 'mostrador';
  document.getElementById('promo-applied-bar').classList.add('hidden');
  document.getElementById('disc-row').style.display = 'flex';
  renderOrderBar();
}

// Swipe right on product area to open order
(function() {
  let sx = 0, sy = 0;
  const area = document.getElementById('products-area');
  if (!area) return;
  area.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:true});
  area.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = Math.abs(e.changedTouches[0].clientY - sy);
    // Swipe right > 80px and mostly horizontal → open order
    if (dx > 80 && dy < 60 && order.length > 0) openOrderSheet();
  }, {passive:true});
})();

// Restore session
(function() {
  try {
    const s = JSON.parse(localStorage.getItem('lf_session') || 'null');
    if (!s || s.date !== new Date().toDateString()) { localStorage.removeItem('lf_session'); return; }
    currentUser = s.user;
    orderN = parseInt(localStorage.getItem('lf_order_n') || '1');
    showPOS();
  } catch { localStorage.removeItem('lf_session'); }
})();

// Ticket + Comanda config cache
var ticketCfg = {};
var comandaCfg = {};

async function loadTicketComandaConfig() {
  try {
    var r = await fetch(SB_URL + '/rest/v1/config?key=like.ticket_*&order=key.asc', {
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
    if (r.ok) { var rows = await r.json(); rows.forEach(function(c){ ticketCfg[c.key]=c.value; }); }
    var r2 = await fetch(SB_URL + '/rest/v1/config?key=like.comanda_*&order=key.asc', {
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
    });
    if (r2.ok) { var rows2 = await r2.json(); rows2.forEach(function(c){ comandaCfg[c.key]=c.value; }); }
  } catch(e) {}
}

async function loadCatalog() {
  try {
    const [prods, grupos, opciones, pm] = await Promise.all([
      sbGet('productos', 'activo=eq.true&order=orden.asc&select=*'),
      sbGet('modificadores_grupos', 'activo=eq.true&order=orden.asc&select=*'),
      sbGet('modificadores_opciones', 'activo=eq.true&order=orden.asc&select=*'),
      sbGet('productos_modificadores', 'order=orden.asc&select=*'),
    ]);
    if (Array.isArray(prods) && prods.length) {
      // Rebuild MODS from DB
      if (Array.isArray(grupos) && grupos.length) {
        grupos.forEach(g => {
          MODS[g.nombre] = { required:g.requerido, min:g.min_seleccion, max:g.max_seleccion, label:g.label||g.nombre,
            options: (Array.isArray(opciones) ? opciones.filter(o=>o.grupo_id===g.id) : []).map(o=>({ name:o.nombre, extra:parseFloat(o.precio_extra)||0 }))
          };
        });
      }
      PRODUCTS.length = 0;
      prods.forEach(p => {
        const mods = (Array.isArray(pm) ? pm.filter(x=>x.producto_id===p.id).sort((a,b)=>a.orden-b.orden) : [])
          .map(x => grupos.find(g=>g.id===x.grupo_id)?.nombre).filter(Boolean);
        PRODUCTS.push({ id:p.id, name:p.nombre, cat:p.categoria, price:parseFloat(p.precio), desc:p.descripcion||'', emoji:p.emoji||'🍓', mods });
        EMOJI_MAP[p.nombre] = p.emoji || '🍓';
      });
    } else { PRODUCTS.push(...PRODUCTS_FALLBACK); }
  } catch { PRODUCTS.push(...PRODUCTS_FALLBACK); }
  renderProducts();
}

function filterCat(cat, btn) {
  catFilter = cat;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function renderProducts() {
  const list = PRODUCTS.filter(p => catFilter==='all' || p.cat===catFilter);
  const grid = document.getElementById('products-grid');
  if (!list.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="e-icon">🔍</div><p>Sin productos</p></div>'; return; }
  grid.innerHTML = list.map(p => {
    const qty = order.filter(i=>i.productId===p.id).reduce((s,i)=>s+i.qty,0);
    const isSpec = p.cat === 'Especiales LFM';
    return `<div class="prod-card${qty?' in-order':''}" onclick="openCustom(${p.id})">
      ${qty ? `<div class="prod-qty-badge">${qty}</div>` : ''}
      ${isSpec ? '<div class="prod-cat-badge">Especial</div>' : ''}
      <div class="prod-emoji">${pEmoji(p.name)}</div>
      <div class="prod-name">${p.name}</div>
      ${p.desc ? `<div class="prod-desc">${p.desc}</div>` : ''}
      <div class="prod-price">$${p.price}${p.mods.includes('Tamaño')?' base':''}</div>
    </div>`;
  }).join('');
  // Hint at bottom when order has items
  if (order.length > 0) {
    const hint = document.createElement('div');
    hint.style.cssText = 'grid-column:1/-1;text-align:center;padding:14px;font-size:12px;color:var(--text-3);';
    hint.innerHTML = '← Desliza a la derecha para ver tu orden →';
    grid.appendChild(hint);
  }
}

function openCustom(pid, editIdx=null) {
  const p = PRODUCTS.find(x=>x.id===pid);
  if (!p) return;
  const sel = {};
  p.mods.forEach(m => { const mod=MODS[m]; if(!mod) return; sel[m] = mod.max===1 ? null : []; });
  if (p.mods.includes('Tamaño') && sel['Tamaño']===null) sel['Tamaño'] = 'Chico';
  if (p.mods.includes('Bases') && sel['Bases']===null) sel['Bases'] = 'Crema';
  CS = { p, sel, editIdx };
  if (editIdx !== null) CS.sel = JSON.parse(JSON.stringify(order[editIdx].sel));

  document.getElementById('cust-emoji').textContent = pEmoji(p.name);
  document.getElementById('cust-name').textContent = p.name;
  document.getElementById('cust-desc').textContent = p.desc || '';
  renderCustomBody();
  updateCustomPrice();
  openSheet('custom');
}

function renderCustomBody() {
  const p = CS.p;
  let html = '';
  p.mods.forEach(modKey => {
    const mod = MODS[modKey];
    if (!mod) return;
    const isSingle = mod.max === 1;
    html += `<div class="mod-section">`;
    html += `<div class="mod-title">${modKey} <span class="mod-badge ${mod.required?'badge-req':'badge-opt'}">${mod.required?'Requerido':'Opcional'}</span></div>`;

    if (modKey === 'Toppings Incluidos') {
      const cnt = (CS.sel[modKey]||[]).length;
      html += `<div class="free-bar"><span style="font-size:12px;color:var(--text-2);">Elige hasta 2 sin costo</span><div class="free-pill${cnt>=2?' full':''}">${cnt}/2 gratis</div></div>`;
    }

    if (isSingle && modKey === 'Tamaño') {
      html += `<div class="sizes-row">`;
      const icons = {Chico:'🫙',Mediano:'🥤',Grande:'🪣'};
      mod.options.forEach(o => {
        const sel = CS.sel[modKey] === o.name;
        html += `<div class="size-card${sel?' sel':''}" onclick="selSingle('${modKey}','${o.name}')">
          <div class="size-icon">${icons[o.name]||'🥤'}</div>
          <div class="size-name">${o.name}</div>
          <div class="size-extra">${o.extra===0?'Base':'+$'+o.extra}</div>
        </div>`;
      });
      html += `</div>`;
    } else if (isSingle) {
      html += `<div class="bases-grid">`;
      mod.options.forEach(o => {
        const sel = CS.sel[modKey] === o.name;
        html += `<div class="base-chip${sel?' sel':''}" onclick="selSingle('${modKey}','${o.name}')">
          <span style="font-size:18px;">${tEmoji(o.name)}</span>
          <div class="base-name">${o.name}</div>
          <div class="base-extra">${o.extra===0?'incl.':'+$'+o.extra}</div>
          <div class="base-check">${sel?'✓':''}</div>
        </div>`;
      });
      html += `</div>`;
    } else {
      const isPrem = modKey === 'Toppings Extra Premium';
      const isShot = modKey === 'Shots Extra';
      html += `<div class="tops-grid">`;
      mod.options.forEach(o => {
        const arr = CS.sel[modKey]||[];
        const cnt = arr.filter(x=>x===o.name).length;
        const isSel = cnt > 0;
        const cls = isSel ? (isPrem?'sel-prem':isShot?'sel-shot':'sel') : '';
        const priceLabel = isSel ? (o.extra===0?'gratis ✓':`+$${o.extra*cnt}${cnt>1?` ×${cnt}`:''}`) : (o.extra===0?'gratis':'+$'+o.extra);
        html += `<div class="top-chip${cls?' '+cls:''}" onclick="toggleTop('${modKey}','${o.name}')">
          <span class="top-emoji">${tEmoji(o.name)}</span>
          <span class="top-name">${o.name}</span>
          <span class="top-price">${priceLabel}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  // Nota
  const nota = CS.note || (CS.editIdx !== null ? order[CS.editIdx].note : '');
  html += `<div class="mod-section">
    <div class="mod-title">Nota <span class="mod-badge badge-opt">Opcional</span></div>
    <textarea class="nota-input" id="cust-nota" placeholder="Sin chamoy, extra crema...">${nota}</textarea>
  </div>`;

  document.getElementById('cust-body').innerHTML = html;
}

function selSingle(modKey, val) { CS.sel[modKey] = val; renderCustomBody(); updateCustomPrice(); }

function toggleTop(modKey, name) {
  const mod = MODS[modKey]; if (!mod) return;
  let arr = CS.sel[modKey] || [];
  const cnt = arr.filter(x=>x===name).length;
  if (cnt > 0) { const idx = arr.lastIndexOf(name); arr.splice(idx,1); }
  else { if (arr.length >= mod.max) return; arr.push(name); }
  CS.sel[modKey] = arr;
  renderCustomBody(); updateCustomPrice();
}

function calcItemPrice() {
  let total = CS.p.price;
  CS.p.mods.forEach(modKey => {
    const mod = MODS[modKey]; if (!mod) return;
    if (mod.max===1) { const opt=mod.options.find(o=>o.name===CS.sel[modKey]); if(opt) total+=opt.extra; }
    else { (CS.sel[modKey]||[]).forEach(name => { const opt=mod.options.find(o=>o.name===name); if(opt) total+=opt.extra; }); }
  });
  return total;
}

function updateCustomPrice() {
  document.getElementById('cust-price').textContent = '$' + calcItemPrice();
  // Validate required
  const valid = CS.p.mods.every(m => {
    const mod=MODS[m]; if(!mod||!mod.required) return true;
    if(mod.max===1) return !!CS.sel[m];
    return (CS.sel[m]||[]).length >= mod.min;
  });
  document.getElementById('cust-add-btn').disabled = !valid;
}

function addToOrder() {
  const p = CS.p;
  const price = calcItemPrice();
  const nota = document.getElementById('cust-nota')?.value.trim() || '';
  const tags = [];
  p.mods.forEach(modKey => {
    const mod=MODS[modKey]; if(!mod) return;
    if (mod.max===1 && CS.sel[modKey]) {
      const opt=mod.options.find(o=>o.name===CS.sel[modKey]);
      tags.push({ modKey, name:CS.sel[modKey], extra:opt?opt.extra:0 });
    } else {
      (CS.sel[modKey]||[]).forEach(name => {
        const opt=mod.options.find(o=>o.name===name);
        tags.push({ modKey, name, extra:opt?opt.extra:0 });
      });
    }
  });
  const item = { uid:Date.now()+Math.random(), productId:p.id, name:p.name, emoji:pEmoji(p.name), sel:JSON.parse(JSON.stringify(CS.sel)), tags, note:nota, unitPrice:price, qty:1 };
  if (CS.editIdx !== null) { const q=order[CS.editIdx].qty; item.qty=q; order[CS.editIdx]=item; }
  else order.push(item);
  closeSheet('custom');
  renderOrderBar();
  renderProducts();
}

function closeCustom() { closeSheet('custom'); }

function calcTotals() {
  const sub = order.reduce((s,i)=>s+i.unitPrice*i.qty,0);
  const desc = Math.round(sub*discount/100);
  const after = sub - desc;
  const iva = Math.round(after*0.16);
  return { sub, desc, iva, total: after+iva };
}

function renderOrderBar() {
  const { total } = calcTotals();
  const totalQty = order.reduce((s,i)=>s+i.qty,0);
  const bar = document.getElementById('order-bar');
  const btn = document.getElementById('tb-order-btn');
  if (order.length) {
    bar.classList.add('visible');
    btn.style.display = 'flex';
    document.getElementById('ob-count').textContent = totalQty + ' producto' + (totalQty!==1?'s':'');
    document.getElementById('ob-total').textContent = '$' + total.toLocaleString('es-MX',{minimumFractionDigits:2});
    const countEl = document.getElementById('tb-order-count');
    if (countEl) countEl.textContent = totalQty;
  } else {
    bar.classList.remove('visible');
    btn.style.display = 'none';
  }
}

function openOrderSheet() {
  // Show discount section based on permission
  var discEl = document.getElementById('disc-section');
  if (discEl) discEl.style.display = window._hasDiscount ? 'block' : 'none';
  verificarPromoHora();
  renderOrderItems();
  openSheet('order');
}

function renderOrderItems() {
  const { sub, desc, iva, total } = calcTotals();
  const list = document.getElementById('order-items-list');

  if (!order.length) {
    list.innerHTML = '<div class="empty-state"><div class="e-icon">🛒</div><p>Agrega productos</p></div>';
  } else {
    list.innerHTML = order.map((item,idx) => {
      const tagHtml = item.tags.map(t => {
        let cls = 'oi-tag tag-top';
        if (t.modKey==='Tamaño') cls='oi-tag tag-size';
        else if (t.modKey==='Bases') cls='oi-tag tag-base';
        else if (t.extra>0) cls='oi-tag tag-paid';
        return `<span class="${cls}">${t.name}${t.extra>0?' +$'+t.extra:''}</span>`;
      }).join('');
      return `<div class="order-item-row">
        <div class="oi-emoji">${item.emoji}</div>
        <div class="oi-info">
          <div class="oi-name">${item.name}</div>
          ${tagHtml?`<div class="oi-tags">${tagHtml}</div>`:''}
          ${item.note?`<div class="oi-note">📝 ${item.note}</div>`:''}
          <span class="oi-edit" onclick="closeOrderSheet();openCustom(${item.productId},${idx})">✏️ Editar</span>
        </div>
        <div class="oi-right">
          <div class="oi-price">$${item.unitPrice*item.qty}</div>
          <div class="qty-row">
            <button class="qty-btn" onclick="chgQty(${idx},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="chgQty(${idx},1)">+</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Totals
  const totEl = document.getElementById('order-totals');
  totEl.innerHTML = `
    <div class="ot-row"><span>Subtotal</span><span>$${sub}</span></div>
    ${desc>0?`<div class="ot-row" style="color:var(--green)"><span>Descuento (${discount}%)</span><span>-$${desc}</span></div>`:''}
    <div class="ot-row"><span>IVA 16%</span><span>$${iva}</span></div>
    <div class="ot-row"><span>Total</span><span style="color:var(--red)">$${total.toLocaleString('es-MX',{minimumFractionDigits:2})}</span></div>`;

  document.getElementById('cobrar-btn').disabled = order.length === 0;
}

function chgQty(idx, d) {
  order[idx].qty += d;
  if (order[idx].qty <= 0) order.splice(idx,1);
  renderOrderItems();
  renderOrderBar();
  renderProducts();
}

function setSvc(s, btn) {
  svcType = s;
  document.querySelectorAll('.svc-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tb-svc-label').textContent = (s==='mostrador'?'Mostrador':s==='para-llevar'?'Para llevar':'Delivery') + ' · ' + (currentUser?.name||'—');
}

function setPay(m, btn) {
  payMethod = m;
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function setDiscount(p, btn) {
  discount = p;
  document.querySelectorAll('.disc-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrderItems();
  renderOrderBar();
}

function cancelOrder() {
  if (!confirm('¿Cancelar esta orden?')) return;
  order = []; discount = 0; promoActiva = null; payMethod = 'efectivo'; svcType = 'mostrador';
  document.getElementById('promo-applied-bar').classList.add('hidden');
  document.getElementById('disc-row').style.display = 'flex';
  document.querySelectorAll('.svc-btn')[0].click();
  document.querySelectorAll('.pay-btn')[0].click();
  closeSheet('order');
  renderOrderBar();
  renderProducts();
}

function openCobro() {
  const { total } = calcTotals();
  document.getElementById('cobro-total').textContent = '$' + total.toLocaleString('es-MX',{minimumFractionDigits:2});
  document.getElementById('cobro-sub').textContent = order.reduce((s,i)=>s+i.qty,0) + ' productos';
  document.getElementById('cobro-pay-label').textContent = payMethod==='efectivo'?'💵 Efectivo':payMethod==='tarjeta'?'💳 Tarjeta':'📲 Transferencia';

  const efecSection = document.getElementById('efec-section');
  efecSection.style.display = payMethod==='efectivo' ? 'block' : 'none';

  if (payMethod === 'efectivo') {
    document.getElementById('efec-input').value = '';
    document.getElementById('cambio-val').textContent = '$0';
    const exact = Math.ceil(total/10)*10;
    const opts = [exact,100,200,500].filter((v,i,a)=>v>=total&&a.indexOf(v)===i).slice(0,4);
    document.getElementById('quick-btns').innerHTML = opts.map(v=>`<button class="quick-btn" onclick="setEfec(${v})">$${v}</button>`).join('');
    document.getElementById('confirmar-btn').disabled = true;
  } else {
    document.getElementById('confirmar-btn').disabled = false;
  }
  closeSheet('order');
  openSheet('cobro');
}

function setEfec(v) { document.getElementById('efec-input').value = v; calcCambio(); }

function calcCambio() {
  const { total } = calcTotals();
  const con = parseFloat(document.getElementById('efec-input').value) || 0;
  const cambio = con - total;
  const el = document.getElementById('cambio-val');
  el.textContent = cambio >= 0 ? '$' + cambio.toLocaleString('es-MX',{minimumFractionDigits:2}) : '—';
  el.style.color = cambio >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('confirmar-btn').disabled = cambio < 0;
}

function closeCobro() { closeSheet('cobro'); }

async function confirmarPago() {
  const { total,sub,desc,iva } = calcTotals();
  const con = parseFloat(document.getElementById('efec-input').value) || total;
  const cambio = payMethod==='efectivo' ? con-total : 0;
  const client = document.getElementById('client-input').value.trim();

  const saleData = { id:orderN, date:new Date(), items:[...order], sub,desc,iva,total,payMethod,svcType,client,cambio,discount,cashReceived:con };
  sales.push(saleData);
  saveToSupabase(saleData);
  descontarInventario(saleData);
  printSale(saleData);

  closeSheet('cobro');

  document.getElementById('sf-sub').textContent = (client?client+' · ':'') + '$'+total.toLocaleString('es-MX',{minimumFractionDigits:2});
  document.getElementById('sf-cambio').textContent = cambio>0 ? 'Cambio: $'+cambio.toLocaleString('es-MX',{minimumFractionDigits:2}) : '';

  // Store last sale for share/reprint
  window._lastSale = saleData;
  const shareBtn = document.getElementById('sf-share-btn');
  const reprintBtn = document.getElementById('sf-reprint-btn');
  if (shareBtn) shareBtn.style.display = 'block';
  if (reprintBtn && printerCfg.ip) reprintBtn.style.display = 'block';

  const sf = document.getElementById('success-flash');
  sf.classList.add('open');
  // Auto-close after 3s, but stay if user taps share/reprint
  sf._autoClose = setTimeout(() => sf.classList.remove('open'), 3000);

  orderN++; order=[]; discount=0; payMethod='efectivo'; svcType='mostrador';
  document.getElementById('order-num').textContent = String(orderN).padStart(3,'0');

let offlineQueue = JSON.parse(localStorage.getItem('lf_offline_queue') || '[]');

async function saveToSupabase(saleData) {
  try {
    const orderPayload = {
      order_number: saleData.id,
      sucursal: currentUser?.sucursal || 'Principal',
      cajero_id: currentUser?.id || null,
      cajero_name: currentUser?.name || 'POS Mobile',
      service_type: saleData.svcType,
      client_name: saleData.client || null,
      pay_method: saleData.payMethod,
      subtotal: saleData.sub,
      discount_pct: saleData.discount,
      discount_amt: saleData.desc,
      iva: saleData.iva,
      total: saleData.total,
      cash_received: saleData.payMethod==='efectivo' ? saleData.cashReceived : null,
      change_given: saleData.payMethod==='efectivo' ? saleData.cambio : null,
    };
    const res = await fetch(SB_URL+'/rest/v1/orders', { method:'POST', headers:SB_H, body:JSON.stringify(orderPayload) });
    if (!res.ok) throw new Error('orders failed');
    const [saved] = await res.json();
    const itemsPayload = saleData.items.map(item => ({
      order_id: saved.id, product_id:item.productId, product_name:item.name,
      size: item.sel?.['Tamaño']||null, base: item.sel?.['Bases']||null,
      toppings: JSON.stringify({ incluidos:item.sel?.['Toppings Incluidos']||[], basicos:item.sel?.['Toppings Extra Básicos']||[], premium:item.sel?.['Toppings Extra Premium']||[], doble:item.sel?.['Doble Topping']||[], shots:item.sel?.['Shots Extra']||[] }),
      note: item.note||null, unit_price:item.unitPrice, qty:item.qty, subtotal:item.unitPrice*item.qty,
    }));
    await fetch(SB_URL+'/rest/v1/order_items', { method:'POST', headers:SB_H, body:JSON.stringify(itemsPayload) });
    if (offlineQueue.length) flushOfflineQueue();
  } catch {
    offlineQueue.push(saleData);
    localStorage.setItem('lf_offline_queue', JSON.stringify(offlineQueue));
  }
}

async function flushOfflineQueue() {
  if (!offlineQueue.length) return;
  const pending = [...offlineQueue]; offlineQueue = [];
  localStorage.setItem('lf_offline_queue', '[]');
  for (const s of pending) await saveToSupabase(s);
}
window.addEventListener('online', () => { if (offlineQueue.length) flushOfflineQueue(); });

// INVENTORY DEDUCTION
// ═══════════════════════════════
async function descontarInventario(saleData) {
  try {
    const [recetas, insumos] = await Promise.all([
      sbGet('recetas','select=*'),
      sbGet('insumos','select=id,nombre,stock_actual,unidad,costo_unitario&activo=eq.true'),
    ]);
    if (!Array.isArray(recetas)||!Array.isArray(insumos)) return;
    const insMap = {}; insumos.forEach(i=>insMap[i.id]=i);
    const deductions = {};
    saleData.items.forEach(item => {
      const sel = item.sel || {};
      const tamano = sel['Tamaño']||null, base = sel['Bases']||null;
      const tops = [...(sel['Toppings Incluidos']||[]),...(sel['Toppings Extra Básicos']||[]),...(sel['Toppings Extra Premium']||[])];
      recetas.filter(r=>r.producto_nombre===item.name).forEach(r => {
        const tipo = r.tipo_componente||'ingrediente', v = r.modificador_opcion;
        let aplica = false;
        if (tipo==='ingrediente') aplica=true;
        else if (tipo==='fruta') aplica = !tamano || v===tamano;
        else if (tipo==='base') { if(tamano&&base) aplica=v===(tamano+' · '+base); else if(tamano) aplica=v?.startsWith(tamano); else aplica=true; }
        else if (tipo==='topping') aplica = tops.includes(v);
        if (!aplica) return;
        const ins=insMap[r.insumo_id]; if(!ins) return;
        const uu=r.unidad_uso||ins.unidad;
        const toG={kg:1000,g:1,gr:1}, toMl={l:1000,ml:1};
        let f=null;
        if(toG[uu]&&toG[ins.unidad]) f=toG[uu]/toG[ins.unidad];
        else if(toMl[uu]&&toMl[ins.unidad]) f=toMl[uu]/toMl[ins.unidad];
        const cantBase = f ? r.cantidad*f : r.cantidad;
        deductions[r.insumo_id] = (deductions[r.insumo_id]||0) + cantBase*item.qty;
      });
    });
    await Promise.all(Object.entries(deductions).map(([insId, cant]) => {
      const ins=insMap[insId]; if(!ins) return;
      const nuevoStock = Math.max(0,(ins.stock_actual||0)-cant);
      return Promise.all([
        fetch(SB_URL+'/rest/v1/insumos?id=eq.'+insId, { method:'PATCH', headers:SB_H, body:JSON.stringify({stock_actual:Math.round(nuevoStock*1000)/1000}) }),
        fetch(SB_URL+'/rest/v1/inv_movimientos', { method:'POST', headers:SB_H, body:JSON.stringify({ insumo_id:parseInt(insId), tipo:'salida', cantidad:parseFloat(cant.toFixed(4)), nota:'Venta orden #'+String(saleData.id).padStart(3,'0'), usuario_name:currentUser?.name||'POS Mobile' }) }),
      ]);
    }));
  } catch(e) { console.error('[INV]', e); }
}

async function cargarPromos() {

      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }

function aplicarCodigo() {
  var codigo = (document.getElementById('promo-code-input').value || '').trim().toUpperCase();
  if (!codigo) return;
  var promo = promosCargadas.find(function(p) {
    return p.tipo === 'codigo' && (p.codigo || '').toUpperCase() === codigo;
  });
  if (!promo) { showToast('❌ Código no válido'); return; }
  // Check vigencia
  if (promo.fecha_fin && new Date(promo.fecha_fin) < new Date()) { showToast('❌ Código expirado'); return; }
  if (promo.usos_max && promo.usos_actuales >= promo.usos_max) { showToast('❌ Código agotado'); return; }
  aplicarPromo(promo);
}

function verificarPromoHora() {
  if (promoActiva) return; // ya hay una promo
  var now = new Date();
  var hhmm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  var promo = promosCargadas.find(function(p) {
    return p.tipo === 'hora' && p.hora_inicio && p.hora_fin && hhmm >= p.hora_inicio && hhmm <= p.hora_fin;
  });
  if (promo) aplicarPromo(promo);
}

function aplicarPromo(promo) {
  promoActiva = promo;
  // Set discount
  discount = parseFloat(promo.valor) || 0;
  // Hide manual disc buttons
  document.getElementById('disc-row').style.display = 'none';
  // Show applied bar
  var bar = document.getElementById('promo-applied-bar');
  var txt = document.getElementById('promo-applied-text');
  bar.classList.remove('hidden');
  txt.textContent = '🎁 ' + promo.nombre + ' — ' + promo.valor + '% OFF';
  document.getElementById('promo-code-input').value = '';
  showToast('✅ ' + promo.nombre + ' aplicada');
  renderOrderItems();
  renderOrderBar();
  // Increment usage counter async
  fetch(SB_URL + '/rest/v1/promociones?id=eq.' + promo.id, {
    method: 'PATCH',
    headers: { 'Content-Type':'application/json', apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY },
    body: JSON.stringify({ usos_actuales: (promo.usos_actuales || 0) + 1 })
  }).catch(function(){});
}

  promoActiva = null;

  document.getElementById('disc-row').style.display = 'flex';

// SHEET HELPERS + SWIPE TO CLOSE
// ═══════════════════════════════
let _sheetStack = []; // track open sheets for back navigation

function openSheet(name) {
  document.getElementById('ov-'+name).classList.add('open');
  requestAnimationFrame(() => {
    const sheet = document.getElementById('sheet-'+name);
    sheet.classList.add('open');
    setupSwipeClose(sheet, name);
  });
  _sheetStack.push(name);
}

function closeSheet(name) {
  document.getElementById('sheet-'+name).classList.remove('open');
  setTimeout(() => document.getElementById('ov-'+name).classList.remove('open'), 300);
  const idx = _sheetStack.lastIndexOf(name);
  if (idx !== -1) _sheetStack.splice(idx, 1);
}

// Swipe down to close any sheet
function setupSwipeClose(sheet, name) {
  if (sheet._swipeSetup) return;
  sheet._swipeSetup = true;

  let startY = 0, startX = 0, curY = 0, dragging = false, locked = false;

  function onStart(e) {
    // Only start drag from handle or sheet-header
    const target = e.target;
    const inHandle = target.closest('.sheet-header-drag') || target.closest('.sheet-header') || target.closest('.sheet-handle');
    if (!inHandle) return;
    const t = e.touches ? e.touches[0] : e;
    startY = t.clientY;
    startX = t.clientX;
    curY = 0;
    dragging = true;
    locked = false;
    sheet.style.transition = 'none';
  }

  function onMove(e) {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const dy = t.clientY - startY;
    const dx = Math.abs(t.clientX - startX);

    // Lock direction on first significant move
    if (!locked) {
      if (Math.abs(dy) < 5 && dx < 5) return;
      locked = true;
      // If mostly horizontal, cancel drag
      if (dx > Math.abs(dy)) { dragging = false; sheet.style.transition = ''; return; }
    }

    curY = Math.max(0, dy);
    sheet.style.transform = `translateY(${curY}px)`;

    // Prevent page scroll while dragging down
    if (curY > 0 && e.cancelable) e.preventDefault();
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    locked = false;
    sheet.style.transition = 'transform 0.3s cubic-bezier(0.25,0.8,0.25,1)';
    if (curY > 120) {
      sheet.style.transform = 'translateY(100%)';
      setTimeout(() => {
        closeSheet(name);
        sheet.style.transform = '';
      }, 280);
    } else {
      sheet.style.transform = 'translateY(0)';
    }
    curY = 0;
  }

  // Use capture on touchmove so we can preventDefault
  sheet.addEventListener('touchstart', onStart, { passive: true });
  sheet.addEventListener('touchmove', onMove, { passive: false });
  sheet.addEventListener('touchend', onEnd, { passive: true });
}

// Hardware back button / swipe back on Android & iOS
window.addEventListener('popstate', () => {
  if (_sheetStack.length > 0) {
    const last = _sheetStack[_sheetStack.length - 1];
    closeSheet(last);
  }
});

// PRINTING — EPSON ePOS + FALLBACK
// ═══════════════════════════════
let printerCfg = JSON.parse(localStorage.getItem('lf_printer_mobile') || '{"ip":"","port":"8008","ticket":true,"comanda":true}');

function buildTicketXML(saleData, type='ticket') {
  const isComanda = type === 'comanda';
  const fmtD = n => '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2});
  const line = (left, right='', bold=false) => {
    const pad = 42, l = left.substring(0, pad-right.length-1);
    const spaces = ' '.repeat(Math.max(1, pad-l.length-right.length));
    return `<text em="${bold}">${l}${spaces}${right}&#10;</text>`;
  };
  const center = (text, bold=false) => `<text align="center" em="${bold}">${text}&#10;</text>`;
  const divider = () => `<text>${'─'.repeat(42)}&#10;</text>`;

  let xml = `<?xml version="1.0" encoding="utf-8"?><s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/"><s:Body><epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">`;

  // Load config helpers
  var tc = ticketCfg;
  var cc = comandaCfg;
  var tcGet = function(k,def){ return tc[k]||def||''; };
  var ccGet = function(k,def){ return cc[k]||def||''; };

  // Font helper for comanda
  var fontTag = function(fontType, text) {
    if (fontType==='double') return '<text width="2" height="2">' + text + '</text>';
    if (fontType==='bold') return '<text em="true">' + text + '</text>';
    if (fontType==='double-bold') return '<text width="2" height="2" em="true">' + text + '</text>';
    return '<text>' + text + '</text>';
  };

  if (isComanda) {
    // Margins
    var marginTop = parseInt(ccGet('comanda_margin_top','0'))||0;
    var marginBot = parseInt(ccGet('comanda_margin_bot','0'))||0;
    var itemSpace = parseInt(ccGet('comanda_item_space','1'))||1;
    var showTitulos = ccGet('comanda_titulos_grupos','true') !== 'false';

    for (var mt=0; mt<marginTop; mt++) xml += '<text>&#10;</text>';
    xml += fontTag(ccGet('comanda_font_marca','bold'), '*** COMANDA ***&#10;');
    xml += fontTag(ccGet('comanda_font_orden','double'), 'Orden #' + String(saleData.id).padStart(3,'0') + '&#10;');
    xml += center(new Date(saleData.date).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}));
    if (saleData.client) xml += center(saleData.client);
    xml += fontTag(ccGet('comanda_font_tipo','bold'), (saleData.svcType==='para-llevar'?'PARA LLEVAR':saleData.svcType==='delivery'?'DELIVERY':'MOSTRADOR') + '&#10;');
    xml += divider();

    saleData.items.forEach(function(item) {
      xml += fontTag(ccGet('comanda_font_items','bold'), 'x' + item.qty + ' ' + item.name.substring(0,30) + '&#10;');
      var sel = item.sel || {};
      if (sel['Tamano'] || sel['Tamaño']) {
        var tam = sel['Tamano'] || sel['Tamaño'];
        if (showTitulos) xml += fontTag(ccGet('comanda_font_mods','normal'), '  Tamano: ' + tam + '&#10;');
        else xml += fontTag(ccGet('comanda_font_mods','normal'), '  ' + tam + '&#10;');
      }
      if (sel['Bases']) xml += fontTag(ccGet('comanda_font_mods','normal'), '  ' + (showTitulos?'Base: ':'') + sel['Bases'] + '&#10;');
      var tops = (sel['Toppings Incluidos']||[]).concat(sel['Toppings Extra Basicos']||[]).concat(sel['Toppings Extra Básicos']||[]).concat(sel['Toppings Extra Premium']||[]);
      if (tops.length) xml += fontTag(ccGet('comanda_font_mods','normal'), '  + ' + tops.join(', ').substring(0,35) + '&#10;');
      var shots = sel['Shots Extra']||[];
      if (shots.length) xml += fontTag(ccGet('comanda_font_mods','normal'), '  Shot: ' + shots.join(', ') + '&#10;');
      if (item.note) xml += fontTag(ccGet('comanda_font_notas','normal'), '  ** ' + item.note.substring(0,30) + '&#10;');
      for (var sp=0; sp<itemSpace; sp++) xml += '<text>&#10;</text>';
    });
    xml += divider();
    if (saleData.client) xml += center(saleData.client);
    for (var mb=0; mb<marginBot; mb++) xml += '<text>&#10;</text>';

  } else {
    // Ticket header from config
    var header = tcGet('ticket_encabezado','LADY FRESA');
    var footer = tcGet('ticket_pie_pagina','');
    var ig = tcGet('ticket_instagram','');
    var wa = tcGet('ticket_whatsapp','');
    var web = tcGet('ticket_web','ladyfresa.mx');
    var qrUrl = tcGet('ticket_qr_url','');
    var qrTxt = tcGet('ticket_qr_texto','');
    var rfc = tcGet('ticket_rfc','');
    var mostrarIva = tcGet('ticket_mostrar_iva','true') !== 'false';
    var mostrarCajero = tcGet('ticket_mostrar_cajero','true') !== 'false';
    var mostrarMods = tcGet('ticket_mostrar_mods','true') !== 'false';
    var mostrarNotas = tcGet('ticket_mostrar_notas','true') !== 'false';

    // Print header lines
    header.split('\n').forEach(function(ln){ if(ln.trim()) xml += center(ln.trim(), true); });
    xml += divider();
    xml += center('Orden #' + String(saleData.id).padStart(3,'0'));
    xml += center(new Date(saleData.date).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
    if (mostrarCajero && currentUser) xml += center('Atendio: ' + currentUser.name);
    xml += divider();

    saleData.items.forEach(function(item) {
      xml += line(item.qty + 'x ' + item.name.substring(0,26), fmtD(item.unitPrice*item.qty));
      if (mostrarMods) {
        var sel = item.sel || {};
        if (sel['Tamano'] || sel['Tamaño']) xml += '<text>  ' + (sel['Tamano']||sel['Tamaño']) + '&#10;</text>';
        var tops = (sel['Toppings Incluidos']||[]).concat(sel['Toppings Extra Basicos']||[]).concat(sel['Toppings Extra Básicos']||[]).concat(sel['Toppings Extra Premium']||[]);
        if (tops.length) xml += '<text>  + ' + tops.join(', ').substring(0,36) + '&#10;</text>';
      }
      if (mostrarNotas && item.note) xml += '<text>  * ' + item.note.substring(0,32) + '&#10;</text>';
    });

    xml += divider();
    xml += line('Subtotal', fmtD(saleData.sub));
    if (saleData.desc > 0) xml += line('Descuento (' + saleData.discount + '%)', '-' + fmtD(saleData.desc));
    if (mostrarIva) xml += line('IVA (16%)', fmtD(saleData.iva));
    xml += divider();
    xml += line('TOTAL', fmtD(saleData.total), true);
    xml += divider();
    var payLabel = saleData.payMethod==='efectivo'?'Efectivo':saleData.payMethod==='tarjeta'?'Tarjeta':'Transferencia';
    xml += line('Pago', payLabel);
    if (saleData.payMethod==='efectivo' && saleData.cambio > 0) {
      xml += line('Con', fmtD(saleData.cashReceived||saleData.total));
      xml += line('Cambio', fmtD(saleData.cambio), true);
    }
    if (rfc) { xml += divider(); xml += center('RFC: ' + rfc); }
    xml += divider();
    if (ig) xml += center(ig);
    if (wa) xml += center('WhatsApp: ' + wa);
    if (web) xml += center(web);
    if (qrUrl) { xml += divider(); if (qrTxt) xml += center(qrTxt); }
    if (footer) { xml += divider(); footer.split('\n').forEach(function(ln){ if(ln.trim()) xml += center(ln.trim()); }); }
  }
  xml += `<cut type="feed"/></epos-print></s:Body></s:Envelope>`;
  return xml;
}

function buildCajonXML() {
  // ESC/POS command to open cash drawer (pin 2)
  return '<?xml version="1.0" encoding="utf-8"?>'
    + '<s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/">'
    + '<s:Body><epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">'
    + '<pulse drawer="drawer_1" time="pulse_100"/>'
    + '</epos-print></s:Body></s:Envelope>';
}

async function printEpson(saleData, type='ticket') {
  const {ip, port} = printerCfg;
  if (!ip) return false;
  try {
    const res = await fetch('http://' + ip + ':' + port + '/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000', {
      method:'POST',
      headers:{'Content-Type':'text/xml; charset=utf-8','SOAPAction':'""'},
      body: buildTicketXML(saleData, type),
      signal: AbortSignal.timeout(8000),
    });
    // Open cash drawer after ticket (only on efectivo payment)
    if (res.ok && type === 'ticket' && saleData.payMethod === 'efectivo') {
      fetch('http://' + ip + ':' + port + '/cgi-bin/epos/service.cgi?devid=local_printer&timeout=5000', {
        method:'POST',
        headers:{'Content-Type':'text/xml; charset=utf-8','SOAPAction':'""'},
        body: buildCajonXML(),
      }).catch(function(){});
    }
    return res.ok;
  } catch { return false; }
}

function buildTicketText(saleData) {
  const fmtD = n => '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2});
  let text = `🍓 LADY FRESA\n`;
  text += `Orden #${String(saleData.id).padStart(3,'0')} · ${new Date(saleData.date).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}\n`;
  if (saleData.client) text += `Cliente: ${saleData.client}\n`;
  text += `─────────────────\n`;
  saleData.items.forEach(item => {
    text += `${item.qty}x ${item.name} — ${fmtD(item.unitPrice*item.qty)}\n`;
    if (item.sel?.['Tamaño']) text += `  Tamaño: ${item.sel['Tamaño']}\n`;
    if (item.sel?.['Bases']) text += `  Base: ${item.sel['Bases']}\n`;
    const tops = [...(item.sel?.['Toppings Incluidos']||[]),...(item.sel?.['Toppings Extra Básicos']||[]),...(item.sel?.['Toppings Extra Premium']||[])];
    if (tops.length) text += `  + ${tops.join(', ')}\n`;
    if (item.note) text += `  📝 ${item.note}\n`;
  });
  text += `─────────────────\n`;
  if (saleData.desc > 0) text += `Descuento (${saleData.discount}%): -${fmtD(saleData.desc)}\n`;
  text += `Total: ${fmtD(saleData.total)}\n`;
  const payLabel = saleData.payMethod==='efectivo'?'Efectivo':saleData.payMethod==='tarjeta'?'Tarjeta':'Transferencia';
  text += `Pago: ${payLabel}\n`;
  if (saleData.payMethod==='efectivo' && saleData.cambio > 0) text += `Cambio: ${fmtD(saleData.cambio)}\n`;
  text += `─────────────────\nladyfresa.mx`;
  return text;
}

async function printSale(saleData) {
  if (printerCfg.ticket !== false) {
    const ok = await printEpson(saleData, 'ticket');
    if (!ok && !printerCfg.ip) showShareSheet(saleData);
  }
  if (printerCfg.comanda !== false) {
    await printEpson(saleData, 'comanda');
  }
}

// ── SHARE TICKET (WhatsApp / Email / etc) ──
function showShareSheet(saleData) {
  const text = buildTicketText(saleData);
  const encoded = encodeURIComponent(text);
  const waUrl = `https://wa.me/?text=${encoded}`;
  const mailUrl = `mailto:?subject=Ticket Lady Fresa %23${String(saleData.id).padStart(3,'0')}&body=${encoded}`;

  // Web Share API (iOS native share sheet)
  if (navigator.share) {
    navigator.share({ title: `Ticket Lady Fresa #${String(saleData.id).padStart(3,'0')}`, text }).catch(()=>{});
    return;
  }
  // Fallback: show mini share modal
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:flex-end;';
  div.innerHTML = `<div style="background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;padding-bottom:max(20px,env(safe-area-inset-bottom))">
    <div style="width:44px;height:5px;background:#ddd;border-radius:3px;margin:0 auto 16px;"></div>
    <div style="font-family:'Bebas Neue',serif;font-size:20px;color:#A6182E;letter-spacing:1px;margin-bottom:16px;">Enviar Ticket</div>
    <a href="${waUrl}" style="display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid #e0e0e0;border-radius:14px;margin-bottom:10px;text-decoration:none;color:#1a0508;">
      <span style="font-size:24px;">💬</span><span style="font-size:14px;font-weight:600;">WhatsApp</span>
    </a>
    <a href="${mailUrl}" style="display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid #e0e0e0;border-radius:14px;margin-bottom:10px;text-decoration:none;color:#1a0508;">
      <span style="font-size:24px;">✉️</span><span style="font-size:14px;font-weight:600;">Correo</span>
    </a>
    <button onclick="this.closest('div[style*=fixed]').remove()" style="width:100%;height:48px;border:none;border-radius:14px;background:#FDF6F7;color:#9a7075;font-family:DM Sans,sans-serif;font-size:14px;cursor:pointer;margin-top:4px;">Cerrar</button>
  </div>`;
  div.onclick = e => { if(e.target===div) div.remove(); };
  document.body.appendChild(div);
}

// ── PRINTER CONFIG ──
function openPrinterCfg() {
  const ip = printerCfg.ip || '';
  const div = document.createElement('div');
  div.id = 'printer-cfg-modal';
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:flex-end;';
  div.innerHTML = `<div style="background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;padding-bottom:max(20px,env(safe-area-inset-bottom))">
    <div style="width:44px;height:5px;background:#ddd;border-radius:3px;margin:0 auto 16px;"></div>
    <div style="font-family:'Bebas Neue',serif;font-size:22px;color:#A6182E;letter-spacing:1px;margin-bottom:16px;">🖨️ Impresora Epson</div>
    <div style="font-size:12px;color:#9a7075;margin-bottom:6px;">IP de la impresora</div>
    <input id="pcfg-ip" value="${ip}" placeholder="192.168.1.100" style="width:100%;height:46px;border:1.5px solid #e0c0c8;border-radius:12px;padding:0 14px;font-size:16px;font-family:monospace;outline:none;margin-bottom:12px;">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <label style="display:flex;align-items:center;gap:8px;flex:1;padding:12px;border:1.5px solid #e0e0e0;border-radius:12px;cursor:pointer;">
        <input type="checkbox" id="pcfg-ticket" ${printerCfg.ticket!==false?'checked':''} style="width:18px;height:18px;accent-color:#A6182E;">
        <span style="font-size:13px;font-weight:500;">Ticket cliente</span>
      </label>
      <label style="display:flex;align-items:center;gap:8px;flex:1;padding:12px;border:1.5px solid #e0e0e0;border-radius:12px;cursor:pointer;">
        <input type="checkbox" id="pcfg-comanda" ${printerCfg.comanda!==false?'checked':''} style="width:18px;height:18px;accent-color:#A6182E;">
        <span style="font-size:13px;font-weight:500;">Comanda</span>
      </label>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="savePrinterCfg()" style="flex:2;height:50px;background:#A6182E;color:#fff;border:none;border-radius:14px;font-family:'Bebas Neue',serif;font-size:18px;letter-spacing:2px;cursor:pointer;">GUARDAR</button>
      <button onclick="document.getElementById('printer-cfg-modal').remove()" style="flex:1;height:50px;background:#FDF6F7;border:none;border-radius:14px;color:#9a7075;font-family:DM Sans,sans-serif;font-size:14px;cursor:pointer;">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}

function savePrinterCfg() {
  printerCfg = {
    ip: document.getElementById('pcfg-ip').value.trim(),
    port: '8008',
    ticket: document.getElementById('pcfg-ticket').checked,
    comanda: document.getElementById('pcfg-comanda').checked,
  };
  localStorage.setItem('lf_printer_mobile', JSON.stringify(printerCfg));
  document.getElementById('printer-cfg-modal')?.remove();
  showToast('✅ Impresora guardada');
}

// ── TOAST ──
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#1a0508;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:600;white-space:nowrap;font-family:DM Sans,sans-serif;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2500);
}
</script>
